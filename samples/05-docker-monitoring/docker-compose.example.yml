version: '3.8'

# Ward Docker 모니터링 예시
#
# 이 파일은 Ward로 모니터링할 수 있는 web, api, worker 컨테이너 구성 예시입니다.
# Ward 에이전트는 호스트에 직접 설치하거나 아래 ward-agent 서비스로 함께 구성할 수 있습니다.
#
# 사용법:
#   docker-compose -f docker-compose.example.yml up -d

services:
  # 웹 프론트엔드 (Nginx)
  web:
    image: nginx:alpine
    container_name: my-web-app        # Ward config.json의 container 값과 일치해야 함
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    restart: unless-stopped
    networks:
      - app-network

  # API 서버 (Node.js)
  api:
    image: node:22-alpine
    container_name: my-api-server     # Ward config.json의 container 값과 일치해야 함
    working_dir: /app
    volumes:
      - ./api:/app
    command: node dist/index.js
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DB_HOST=db
    ports:
      - "4000:4000"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

  # 백그라운드 워커 (Node.js)
  worker:
    image: node:22-alpine
    container_name: my-worker         # Ward config.json의 container 값과 일치해야 함
    working_dir: /app
    volumes:
      - ./api:/app
    command: node dist/worker.js
    environment:
      - NODE_ENV=production
      - DB_HOST=db
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - app-network

  # 데이터베이스 (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: my-postgres
    environment:
      - POSTGRES_DB=myapp
      - POSTGRES_USER=myapp
      - POSTGRES_PASSWORD=secret
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

  # Ward 에이전트 (선택사항: 호스트 직접 설치 대신 컨테이너로 운영할 경우)
  # ward-agent:
  #   image: ward-agent:latest
  #   container_name: ward-agent
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock  # Docker 소켓 공유 (필수)
  #     - ~/.ward:/root/.ward                         # Ward 설정 파일
  #   restart: unless-stopped
  #   network_mode: host  # ward 서버와 통신을 위해 host 네트워크 사용

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
