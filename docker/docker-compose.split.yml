# server 전용 또는 web 전용으로 사용
# 사용법: docker compose -f docker-compose.split.yml up server
# 사용법: docker compose -f docker-compose.split.yml up web
version: '3.8'
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ward}
      POSTGRES_USER: ${POSTGRES_USER:-ward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ward}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ward}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ward}
      SERVER_PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-30}
      LOGS_RETENTION_DAYS: ${LOGS_RETENTION_DAYS:-7}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    # 외부 server URL이 필요합니다 (NEXT_PUBLIC_SERVER_URL 환경변수 설정 필요)
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL}
      INTERNAL_SERVER_URL: ${INTERNAL_SERVER_URL:-${NEXT_PUBLIC_SERVER_URL}}
    ports:
      - "3000:3000"

volumes:
  pgdata:
