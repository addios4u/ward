version: '3.8'
services:
  db:
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ward}
      POSTGRES_USER: ${POSTGRES_USER:-ward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: ko_KR.UTF-8
      LC_ALL: ko_KR.UTF-8
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ward}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-ward}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-ward}
      REDIS_URL: redis://:${REDIS_PASSWORD:-}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SERVER_PORT: 4000
      JWT_SECRET: ${JWT_SECRET}
      METRICS_RETENTION_DAYS: ${METRICS_RETENTION_DAYS:-30}
      LOGS_RETENTION_DAYS: ${LOGS_RETENTION_DAYS:-7}
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_SERVER_URL: ${NEXT_PUBLIC_SERVER_URL:-http://localhost:4000}
      INTERNAL_SERVER_URL: http://server:4000
    ports:
      - "3000:3000"
