name: ward
services:
  postgresql:
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ward}
      POSTGRES_USER: ${POSTGRES_USER:-ward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: ko_KR.UTF-8
      LC_ALL: ko_KR.UTF-8
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ward}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD"; else exec redis-server; fi'
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - server-1
      - server-2

  server-1:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ward}:${POSTGRES_PASSWORD:-wardpassword}@postgresql:5432/${POSTGRES_DB:-ward}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      WARD_LEADER: "true"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5

  server-2:
    build:
      context: ..
      dockerfile: docker/Dockerfile.server
    restart: unless-stopped
    environment:
      NODE_ENV: production
      SERVER_PORT: 4001
      DATABASE_URL: postgresql://${POSTGRES_USER:-ward}:${POSTGRES_PASSWORD:-wardpassword}@postgresql:5432/${POSTGRES_DB:-ward}
      REDIS_URL: redis://redis:6379
      SESSION_SECRET: ${SESSION_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      WARD_LEADER: "false"
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4001/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
