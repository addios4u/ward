name: ward
services:
  postgresql:
    build:
      context: ..
      dockerfile: docker/Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ward}
      POSTGRES_USER: ${POSTGRES_USER:-ward}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      LANG: ko_KR.UTF-8
      LC_ALL: ko_KR.UTF-8
    volumes:
      - ./data/postgresql:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ward}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: sh -c 'if [ -n "$$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$$REDIS_PASSWORD" --stop-writes-on-bgsave-error no; else exec redis-server --stop-writes-on-bgsave-error no; fi'
    volumes:
      - ./data/redis:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'
