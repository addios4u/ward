events {
    worker_connections 1024;
}

http {
    upstream ward_backend {
        # ip_hash 제거: 세션은 Redis에 저장되므로 고정 라우팅 불필요
        # ip_hash 사용 시 특정 클라이언트 IP의 트래픽이 항상 한 인스턴스로만 쏠려
        # 나머지 인스턴스에 access log가 전혀 기록되지 않는 문제 발생
        server host.docker.internal:4000;
        server host.docker.internal:4001;
    }

    server {
        listen 80;

        # 일반 HTTP 요청 (API + 정적 파일)
        location / {
            proxy_pass http://ward_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # WebSocket 업그레이드
        location /ws {
            proxy_pass http://ward_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
    }
}
